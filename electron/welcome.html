<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Controller</title>
    <link rel="stylesheet" href="./welcome.css" />
  </head>
  <body>
    <main class="welcome">
      <div class="welcome__card" role="dialog" aria-labelledby="welcome-title" aria-describedby="welcome-subtitle">
        <header class="welcome__header">
          <div class="welcome__icon" aria-hidden="true">
            <img src="./welcome-icon.png" alt="" width="36" height="36" />
          </div>
          <h1 id="welcome-title" class="welcome__title">Welcome to Controller</h1>
          <p id="welcome-subtitle" class="welcome__subtitle">
            Pick the port the local backend will run on. To open this app from your
            phone, install
            <a href="https://tailscale.com/" target="_blank" rel="noopener noreferrer">Tailscale</a>
            to reach it over a private network.
          </p>
        </header>

        <form class="welcome__form" id="welcome-form" novalidate>
          <label class="welcome__label" for="port-input">Backend port</label>
          <div class="welcome__input-row">
            <input
              id="port-input"
              name="port"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              spellcheck="false"
              class="welcome__input"
              value="4500"
              aria-describedby="port-feedback"
            />
            <button
              id="continue-btn"
              type="submit"
              class="welcome__button welcome__button--primary"
              disabled
            >
              Continue
            </button>
          </div>
          <p id="port-feedback" class="welcome__feedback" role="status" aria-live="polite">
            Checking port...
          </p>
        </form>
      </div>
    </main>
    <script type="module" src="./welcome.js"></script>
  </body>
</html>
